<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Create Group</title>
    <meta http-equiv="refresh" content="0; url=/index.html?panel=create-group" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Manrope", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 24%),
          radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.08), transparent 24%),
          linear-gradient(180deg, #f8fbff, #eef4fb 55%, #f5f8fc);
        color: #0f172a;
      }

      .redirect-card {
        width: min(420px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 24px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="redirect-card">
      <h1>Create Group</h1>
      <p>Redirecting you to the workspace panel...</p>
    </div>
    <script>
      window.location.replace("/index.html?panel=create-group");
    </script>
  </body>
</html>
