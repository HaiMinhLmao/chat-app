<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClassRoom - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .register-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-btn.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #3c3;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div class="logo-section">
                <div class="logo">MC</div>
                <div class="logo-text">MyClassRoom</div>
                <div class="logo-subtitle">Tạo tài khoản MyClassRoom</div>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Nhập email của bạn"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        placeholder="Nhập họ và tên"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Nhập mật khẩu"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="register-btn" id="registerBtn">Đăng ký</button>
            </form>

            <div class="login-link">
                Đã có tài khoản? <a href="/login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script>
        const AUTH_SESSION_KEY = 'authSession';
        const LEGACY_SESSION_KEY = 'supabaseSession';
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');
        const emailInput = document.getElementById('email');
        const fullNameInput = document.getElementById('fullName');
        const passwordInput = document.getElementById('password');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const fullName = fullNameInput.value.trim();
            const password = passwordInput.value;

            if (!email || !fullName || !password) {
                showError('Vui lòng nhập đầy đủ thông tin.');
                return;
            }

            if (password.length < 6) {
                showError('Mật khẩu phải có ít nhất 6 ký tự.');
                return;
            }

            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            registerBtn.textContent = 'Đang tạo tài khoản...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        fullName: fullName,
                        password: password
                    })
                });

                console.log('Register response status:', response.status);
                const data = await response.json();
                console.log('Register response:', data);

                if (response.ok) {
                    sessionStorage.removeItem(AUTH_SESSION_KEY);
                    sessionStorage.removeItem(LEGACY_SESSION_KEY);
                    sessionStorage.removeItem('currentUser');
                    sessionStorage.setItem('registrationEmail', email);

                    console.log('Registration successful, redirecting to login...');
                    showSuccess(data.message || 'Tạo tài khoản thành công. Đang chuyển sang trang đăng nhập...');

                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1400);
                } else {
                    const error = data.error || 'Đăng ký thất bại.';
                    console.log('Registration failed:', error);
                    showError(error);
                    registerBtn.classList.remove('loading');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Đăng ký';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('Có lỗi kết nối. Vui lòng thử lại.');
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Đăng ký';
            }
        });

        function showError(message) {
            errorMessage.textContent = translateAuthMessage(message);
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = translateAuthMessage(message);
            successMessage.classList.add('show');
        }

        function translateAuthMessage(message) {
            const text = String(message || '').trim();
            if (!text) return 'Có lỗi xảy ra. Vui lòng thử lại.';
            if (text === 'Please fill in all fields') return 'Vui lòng nhập đầy đủ thông tin.';
            if (text === 'Password must be at least 6 characters long') {
                return 'Mật khẩu phải có ít nhất 6 ký tự.';
            }
            if (text === 'Request body is required' || text === 'Thiếu dữ liệu gửi lên.') {
                return 'Thiếu dữ liệu gửi lên.';
            }
            if (text === 'Email and password are required' || text === 'Vui lòng nhập email và mật khẩu.') {
                return 'Vui lòng nhập email và mật khẩu.';
            }
            if (text.includes('Email is invalid') || text.includes('Email không hợp lệ')) {
                return 'Email không hợp lệ. Vui lòng nhập đúng định dạng, ví dụ name@gmail.com.';
            }
            if (text.includes('already registered') || text.includes('đã được đăng ký')) {
                return 'Email này đã được đăng ký. Vui lòng đăng nhập.';
            }
            if (text === 'Registration failed' || text === 'Đăng ký thất bại.') {
                return 'Đăng ký thất bại.';
            }
            if (text === 'An error occurred. Please try again.' || text === 'Có lỗi kết nối. Vui lòng thử lại.') {
                return 'Có lỗi kết nối. Vui lòng thử lại.';
            }
            if (text.includes('Supabase Auth is unavailable') || text.includes('Hệ thống đăng nhập đang tạm thời không khả dụng')) {
                return 'Hệ thống đăng ký đang tạm thời không khả dụng. Vui lòng thử lại sau.';
            }
            if (text.includes('database') || text.includes('mất kết nối dữ liệu')) {
                return 'Hệ thống đang tạm mất kết nối dữ liệu. Vui lòng thử lại sau.';
            }
            if (text.includes('Account created successfully') || text.includes('Tạo tài khoản thành công')) {
                return 'Tạo tài khoản thành công. Đang chuyển sang trang đăng nhập...';
            }
            return text;
        }

        // Clear error when user starts typing
        [emailInput, fullNameInput, passwordInput].forEach(input => {
            input.addEventListener('focus', () => {
                errorMessage.classList.remove('show');
            });
        });
    </script>
</body>
</html>
