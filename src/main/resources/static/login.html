<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClassRoom - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px; font-weight: bold; color: white;
        }
        .logo-text { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 5px; }
        .logo-subtitle { font-size: 13px; color: #999; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 8px;
            color: #333; font-weight: 600; font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn.loading { opacity: 0.85; pointer-events: none; }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #c33;
        }
        .error-message.show { display: block; }

        .success-message {
            background: #efe;
            color: #2f855a;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #2f855a;
        }
        .success-message.show { display: block; }

        .link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .link a:hover { color: #764ba2; }

        .auth-success-loader {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.78);
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.24s ease, visibility 0.24s ease;
        }
        .auth-success-loader.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .auth-success-loader-card {
            min-width: min(100%, 340px);
            padding: 28px 32px;
            border-radius: 28px;
            background: rgba(10, 15, 36, 0.94);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
            display: grid;
            justify-items: center;
            gap: 20px;
        }
        .loader-wrapper {
            position: relative;
            width: 126px;
            height: 52px;
        }
        .loader-wrapper .packman::before,
        .loader-wrapper .packman::after {
            content: '';
            position: absolute;
            left: 26px;
            width: 50px;
            height: 25px;
            background-color: #EFF107;
            box-shadow: 0 0 18px rgba(239, 241, 7, 0.28);
        }
        .loader-wrapper .packman::before {
            top: 0;
            border-radius: 100px 100px 0 0;
            transform: translate(-50%, -50%);
            animation: pac-top 0.5s linear infinite;
            transform-origin: center bottom;
        }
        .loader-wrapper .packman::after {
            bottom: 0;
            border-radius: 0 0 100px 100px;
            transform: translate(-50%, 50%);
            animation: pac-bot 0.5s linear infinite;
            transform-origin: center top;
        }
        .dots .dot {
            position: absolute;
            z-index: -1;
            top: 21px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.24);
        }
        .dots .dot:nth-child(1) {
            left: 92px;
            animation: dot-stage1 0.5s infinite;
        }
        .dots .dot:nth-child(2) {
            left: 64px;
            animation: dot-stage1 0.5s infinite;
        }
        .dots .dot:nth-child(3) {
            left: 36px;
            animation: dot-stage1 0.5s infinite;
        }
        .dots .dot:nth-child(4) {
            left: 10px;
            animation: dot-stage2 0.5s infinite;
        }
        .auth-loader-copy {
            text-align: center;
        }
        .auth-loader-copy strong {
            display: block;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .auth-loader-copy span {
            display: block;
            margin-top: 8px;
            color: rgba(226, 232, 240, 0.82);
            font-size: 14px;
            line-height: 1.55;
        }

        @keyframes pac-top {
            0% { transform: translate(-50%, -50%) rotate(0) }
            50% { transform: translate(-50%, -50%) rotate(-30deg) }
            100% { transform: translate(-50%, -50%) rotate(0) }
        }
        @keyframes pac-bot {
            0% { transform: translate(-50%, 50%) rotate(0) }
            50% { transform: translate(-50%, 50%) rotate(30deg) }
            100% { transform: translate(-50%, 50%) rotate(0) }
        }
        @keyframes dot-stage1 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-24px, 0); }
        }
        @keyframes dot-stage2 {
            0% { transform: scale(1); }
            5%, 100% { transform: scale(0); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <div class="logo-section">
            <div class="logo">MC</div>
            <div class="logo-text">MyClassRoom</div>
            <div class="logo-subtitle">Đăng nhập vào MyClassRoom</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="username" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="Nhập mật khẩu" required>
            </div>
            <button class="btn" type="submit" id="loginBtn">Đăng nhập</button>
        </form>

        <div class="link">
            Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a>
        </div>
    </div>
</div>

<div class="auth-success-loader" id="authSuccessLoader" aria-hidden="true">
    <div class="auth-success-loader-card">
        <div class="loader-wrapper">
            <div class="packman"></div>
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        <div class="auth-loader-copy">
            <strong>Đăng nhập thành công</strong>
            <span>Đang chuẩn bị workspace và đồng bộ tài nguyên cho bạn.</span>
        </div>
    </div>
</div>

<script>
    function mustGetElement(id) {
        const element = document.getElementById(id);
        if (!element) {
            throw new Error('Missing required element #' + id);
        }
        return element;
    }

    const AUTH_SESSION_KEY = 'authSession';
    const LEGACY_SESSION_KEY = 'supabaseSession';
    const WORKSPACE_BOOT_LOADER_KEY = 'workspaceBootLoader';
    const loginForm = /** @type {HTMLFormElement} */ (mustGetElement('loginForm'));
    const loginBtn = /** @type {HTMLButtonElement} */ (mustGetElement('loginBtn'));
    const errorMessage = mustGetElement('errorMessage');
    const successMessage = mustGetElement('successMessage');
    const emailInput = /** @type {HTMLInputElement} */ (mustGetElement('email'));
    const passwordInput = /** @type {HTMLInputElement} */ (mustGetElement('password'));
    const authSuccessLoader = mustGetElement('authSuccessLoader');

    const registrationEmail = sessionStorage.getItem('registrationEmail');
    if (registrationEmail) {
        emailInput.value = registrationEmail;
        successMessage.textContent = 'Tạo tài khoản thành công. Vui lòng đăng nhập.';
        successMessage.classList.add('show');
        sessionStorage.removeItem('registrationEmail');
        passwordInput.focus();
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMessage.classList.remove('show');
        successMessage.classList.remove('show');

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            showError('Vui lòng nhập email và mật khẩu.');
            return;
        }

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        loginBtn.textContent = 'Đang đăng nhập...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                showError(data.error || 'Đăng nhập thất bại.');
                resetBtn();
                return;
            }

            // Keep the auth session payload for the rest of the app
            sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(data));
            sessionStorage.removeItem(LEGACY_SESSION_KEY);

            // A minimal "currentUser" object for existing index.html logic
            const user = data.user || (data?.data && data.data.user) || null;
            const username =
                (user?.user_metadata && (user.user_metadata.full_name || user.user_metadata.username)) ||
                (user?.email ? user.email.split('@')[0] : 'User');

            sessionStorage.setItem('currentUser', JSON.stringify({
                username,
                email: user?.email || email
            }));

            sessionStorage.setItem(WORKSPACE_BOOT_LOADER_KEY, '1');
            authSuccessLoader.classList.add('show');
            authSuccessLoader.setAttribute('aria-hidden', 'false');

            const returnTo = new URLSearchParams(window.location.search).get('returnTo');
            const nextUrl = returnTo || '/index.html';
            window.setTimeout(() => {
                window.location.replace(nextUrl);
            }, 220);
        } catch (err) {
            showError('Lỗi kết nối. Vui lòng thử lại.');
            resetBtn();
        }
    });

    function resetBtn() {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Đăng nhập';
    }

    function showError(msg) {
        errorMessage.textContent = translateAuthMessage(msg);
        errorMessage.classList.add('show');
    }

    function translateAuthMessage(msg) {
        const text = String(msg || '').trim();
        if (!text) return 'Có lỗi xảy ra. Vui lòng thử lại.';
        if (text === 'Please enter your email and password') return 'Vui lòng nhập email và mật khẩu.';
        if (text === 'Request body is required' || text === 'Thiếu dữ liệu gửi lên.') return 'Thiếu dữ liệu gửi lên.';
        if (text === 'Email and password are required' || text === 'Vui lòng nhập email và mật khẩu.') return 'Vui lòng nhập email và mật khẩu.';
        if (text === 'Invalid login credentials.' || text === 'Email hoặc mật khẩu không đúng.') return 'Email hoặc mật khẩu không đúng.';
        if (text.startsWith('Login failed:')) return 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.';
        if (text === 'Login failed') return 'Đăng nhập thất bại.';
        if (text === 'Network error. Please try again.') return 'Lỗi kết nối. Vui lòng thử lại.';
        if (text === 'Sign in again.' || text === 'Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.') {
            return 'Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.';
        }
        if (text.includes('Supabase Auth is unavailable') || text.includes('Hệ thống đăng nhập đang tạm thời không khả dụng')) {
            return 'Hệ thống đăng nhập đang tạm thời không khả dụng. Vui lòng thử lại sau.';
        }
        if (text.includes('database') || text.includes('mất kết nối dữ liệu')) {
            return 'Hệ thống đang tạm mất kết nối dữ liệu. Vui lòng thử lại sau.';
        }
        return text;
    }
</script>
</body>
</html>
