<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClassRoom - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px; font-weight: bold; color: white;
        }
        .logo-text { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 5px; }
        .logo-subtitle { font-size: 13px; color: #999; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 8px;
            color: #333; font-weight: 600; font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn.loading { opacity: 0.85; pointer-events: none; }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #c33;
        }
        .error-message.show { display: block; }

        .success-message {
            background: #efe;
            color: #2f855a;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #2f855a;
        }
        .success-message.show { display: block; }

        .link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .link a:hover { color: #764ba2; }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <div class="logo-section">
            <div class="logo">MC</div>
            <div class="logo-text">MyClassRoom</div>
            <div class="logo-subtitle">Sign in with Supabase Auth</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="username" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password" required>
            </div>
            <button class="btn" type="submit" id="loginBtn">Sign In</button>
        </form>

        <div class="link">
            Don't have an account? <a href="/register.html">Create one</a>
        </div>
    </div>
</div>

<script>
    const AUTH_SESSION_KEY = 'authSession';
    const LEGACY_SESSION_KEY = 'supabaseSession';
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const registrationEmail = sessionStorage.getItem('registrationEmail');
    if (registrationEmail) {
        emailInput.value = registrationEmail;
        successMessage.textContent = 'Account created successfully. Please sign in.';
        successMessage.classList.add('show');
        sessionStorage.removeItem('registrationEmail');
        passwordInput.focus();
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMessage.classList.remove('show');
        successMessage.classList.remove('show');

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            showError('Please enter your email and password');
            return;
        }

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                showError(data.error || 'Login failed');
                resetBtn();
                return;
            }

            // Keep the auth session payload for the rest of the app
            sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(data));
            sessionStorage.removeItem(LEGACY_SESSION_KEY);

            // A minimal "currentUser" object for existing index.html logic
            const user = data.user || (data?.data && data.data.user) || null;
            const username =
                (user?.user_metadata && (user.user_metadata.full_name || user.user_metadata.username)) ||
                (user?.email ? user.email.split('@')[0] : 'User');

            sessionStorage.setItem('currentUser', JSON.stringify({
                username,
                email: user?.email || email
            }));

            window.location.href = '/index.html';
        } catch (err) {
            showError('Network error. Please try again.');
            resetBtn();
        }
    });

    function resetBtn() {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
    }

    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.classList.add('show');
    }
</script>
</body>
</html>
