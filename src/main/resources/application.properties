spring.application.name=chat-app

# Supabase configuration
supabase.url=https://rjzmwzphuiwajbxneldd.supabase.co
supabase.anon.key=${SUPABASE_ANON_KEY:}

# Supabase Postgres datasource (Session pooler)
spring.datasource.url=${SUPABASE_DB_JDBC_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres.rjzmwzphuiwajbxneldd}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0

# Validate Supabase JWT access tokens
spring.security.oauth2.resourceserver.jwt.issuer-uri=${supabase.url}/auth/v1
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

