spring.datasource.username=${SUPABASE_DB_USERNAME:postgres.qveeybjygyakxxjadklc}
spring.datasource.password=${SUPABASE_DB_PASSWORD:hoquangminh123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0

# Local fallback admin login while Supabase auth is still being finalized.
