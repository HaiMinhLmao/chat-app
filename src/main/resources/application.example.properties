spring.application.name=chat-app
server.port=${PORT:8080}

# Supabase configuration
supabase.url=${SUPABASE_URL:https://qveeybjygyakxxjadklc.supabase.co}
supabase.anon.key=${SUPABASE_ANON_KEY}
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:chat-attachments}
supabase.storage.signed-url-seconds=${SUPABASE_STORAGE_SIGNED_URL_SECONDS:3600}

# Supabase Postgres datasource (Session pooler on 5432)
# Session mode is the safer default for a long-running Spring Boot service.
spring.datasource.url=${SUPABASE_DB_JDBC_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:1}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.prepareThreshold=${SPRING_DATASOURCE_PREPARE_THRESHOLD:0}
spring.datasource.hikari.data-source-properties.preferQueryMode=${SPRING_DATASOURCE_PREFER_QUERY_MODE:simple}
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=${SPRING_DATASOURCE_PREPARED_STATEMENT_CACHE_QUERIES:0}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.hibernate.ddl-auto=none
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

