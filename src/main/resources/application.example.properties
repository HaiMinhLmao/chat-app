spring.application.name=chat-app

# Supabase configuration
supabase.url=https://qveeybjygyakxxjadklc.supabase.co
supabase.anon.key=${SUPABASE_ANON_KEY}

# Supabase Postgres datasource (Transaction pooler on 6543)
spring.datasource.url=${SUPABASE_DB_JDBC_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres.qveeybjygyakxxjadklc}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.hibernate.ddl-auto=none

